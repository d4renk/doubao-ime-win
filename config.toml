# Doubao Voice Input - Configuration File
# 豆包语音输入配置文件

[general]
# 开机自启动
auto_start = false
# 语言
language = "zh-CN"

[hotkey]
# 绑定来源: "standard" (标准快捷键) 或 "raw" (Windows 非标准按键)
binding = "standard"
# 标准热键模式: "combo" (组合键) 或 "double_tap" (双击)
mode = "double_tap"
# 组合键 (当 mode = "combo" 时生效)
combo_key = "Ctrl+Shift+V"
# 双击键 (当 mode = "double_tap" 时生效)
double_tap_key = "Ctrl"
# 双击间隔 (毫秒)
double_tap_interval = 300
# 非标准按键由设置窗口“录入非标准按键”自动填写
raw_vk_code = 0
raw_scan_code = 0
raw_extended = false
# 非标准按键触发方式: "toggle" (按下切换) 或 "hold" (按住说话)
raw_trigger = "toggle"

[floating_button]
# 是否显示悬浮按钮
enabled = true
# 悬浮按钮位置 (像素)
position_x = 100
position_y = 100

[asr]
# 是否启用 VAD (语音活动检测)
vad_enabled = true
# WebRTC AEC3 回声消除；需要 Windows 默认扬声器 loopback，失败时自动降级
aec_enabled = false
# VAD 语音结束后的尾音保留窗口（毫秒）；同时透传给云端 ASR
end_smooth_window_ms = 800
# 编码前固定麦克风增益（0.25-4.0），1.0 保持原始电平
post_ratio_gain = 1.0
# 音质: "standard" (16kHz) 或 "high_quality" (24kHz)
audio_quality = "standard"
# 标点: "smart", "spaces", "no_sentence_final", "preserve"
punctuation_mode = "smart"

[cloud]
# 将 ASR final 异步发送给 NER，用于后续上下文和候选优化；不会修改已提交文本
ner_enabled = true
# 会话结束后流式清理口水词；10 秒内收到完整结果则自动一次性替换
auto_polish_enabled = true
