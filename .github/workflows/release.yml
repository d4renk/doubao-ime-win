name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to release
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  release:
    name: Build and publish Windows x64
    runs-on: windows-2025
    permissions:
      contents: write
    steps:
      - name: Resolve and validate release tag
        id: release_tag
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          $tag = if ($env:EVENT_NAME -eq "workflow_dispatch") { $env:INPUT_TAG } else { $env:REF_NAME }
          if ($tag -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "Release tag must be a semantic v* tag: $tag"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ steps.release_tag.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Verify repository allowlist
        shell: pwsh
        run: ./scripts/check-repository-allowlist.ps1

      - name: Install pinned Rust toolchain
        shell: pwsh
        run: rustup toolchain install 1.97.0 --profile minimal --target x86_64-pc-windows-msvc

      - name: Cache Cargo data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
          key: windows-release-cargo-1.97.0-${{ hashFiles('Cargo.lock') }}

      - name: Verify and install vendored Protoc
        shell: pwsh
        run: |
          $expected = "0b31be019b9fe45a388e93bf1f16d70afdf9ce5caf958ea47892fbc868b5a1b3"
          $actual = (Get-FileHash protoc-33.4-win64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "Protoc archive checksum mismatch: $actual"
          }
          $protocDir = Join-Path $env:RUNNER_TEMP "protoc-33.4"
          Expand-Archive -Path protoc-33.4-win64.zip -DestinationPath $protocDir -Force
          (Join-Path $protocDir "bin") | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build locked release
        shell: pwsh
        run: ./scripts/build-release.ps1

      - name: Prepare release files and checksum
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/doubao-voice-input.exe dist/doubao-voice-input.exe
          Copy-Item config.toml.example dist/config.toml
          $hash = (Get-FileHash dist/doubao-voice-input.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *doubao-voice-input.exe" | Set-Content dist/doubao-voice-input.exe.sha256 -Encoding ascii

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG dist/doubao-voice-input.exe dist/doubao-voice-input.exe.sha256 dist/config.toml --clobber
          } else {
            gh release create $env:RELEASE_TAG dist/doubao-voice-input.exe dist/doubao-voice-input.exe.sha256 dist/config.toml --verify-tag --generate-notes --title $env:RELEASE_TAG
          }
