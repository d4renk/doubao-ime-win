name: Windows CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  audit:
    name: RustSec audit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify repository allowlist
        shell: pwsh
        run: ./scripts/check-repository-allowlist.ps1

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.0 --profile minimal

      - name: Install pinned cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit locked dependencies
        run: cargo audit --file Cargo.lock

  build:
    name: Build Windows x64
    runs-on: windows-2025
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install pinned Rust toolchain
        shell: pwsh
        run: rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt --target x86_64-pc-windows-msvc

      - name: Cache Cargo data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
          key: windows-cargo-1.97.0-${{ hashFiles('Cargo.lock') }}

      - name: Verify and install vendored Protoc
        shell: pwsh
        run: |
          $expected = "0b31be019b9fe45a388e93bf1f16d70afdf9ce5caf958ea47892fbc868b5a1b3"
          $actual = (Get-FileHash protoc-33.4-win64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "Protoc archive checksum mismatch: $actual"
          }
          $protocDir = Join-Path $env:RUNNER_TEMP "protoc-33.4"
          Expand-Archive -Path protoc-33.4-win64.zip -DestinationPath $protocDir -Force
          (Join-Path $protocDir "bin") | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show build tool versions
        shell: pwsh
        run: |
          rustc --version
          cargo --version
          protoc --version
          cmake --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets

      - name: Build release executable
        shell: pwsh
        run: ./scripts/build-release.ps1

      - name: Prepare default configuration
        shell: pwsh
        run: Copy-Item config.toml.example config.toml

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: doubao-voice-input-windows-${{ github.sha }}
          path: |
            target/x86_64-pc-windows-msvc/release/doubao-voice-input.exe
            config.toml
          if-no-files-found: error
          retention-days: 30
